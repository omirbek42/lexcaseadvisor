<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LexCaseAdvisor</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f4f5f7; color: #1c1e21; }
  header { background: #0f2540; color: #fff; padding: 16px 24px; }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; font-size: 13px; color: #b9c6d6; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .panel { background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .panel h2 { margin: 0 0 12px; font-size: 15px; }
  textarea, select, input[type=text] { width: 100%; padding: 8px; border: 1px solid #ccd0d5; border-radius: 6px; font-size: 14px; }
  .filters { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
  .filters > div { flex: 1; min-width: 160px; }
  .filters label { font-size: 12px; color: #65676b; display: block; margin-bottom: 4px; }
  button { background: #0f2540; color: #fff; border: none; padding: 9px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  button:hover { background: #1a3a63; }
  button.secondary { background: #fff; color: #0f2540; border: 1px solid #0f2540; }
  button.secondary:hover { background: #eef2f7; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions { margin-top: 12px; display: flex; gap: 8px; }
  .results { display: grid; gap: 10px; }
  .case-card { border: 1px solid #e1e4e8; border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: box-shadow .15s; }
  .case-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .case-card.selected { border-color: #0f2540; background: #f0f4f9; }
  .case-card .top { display: flex; justify-content: space-between; align-items: baseline; }
  .case-card .title { font-weight: 600; font-size: 14px; }
  .case-card .score { font-size: 12px; background: #e6f0ff; color: #0f2540; padding: 2px 8px; border-radius: 10px; }
  .case-card .meta { font-size: 12px; color: #65676b; margin-top: 4px; }
  .case-card .why { font-size: 12px; color: #2c662d; margin-top: 6px; }
  mark { background: #fff3a3; padding: 0 2px; border-radius: 2px; }
  .empty { color: #65676b; font-size: 13px; padding: 12px 0; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 10; }
  .modal { background: #fff; border-radius: 8px; max-width: 640px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 20px; }
  .modal h3 { margin-top: 0; }
  .field { margin-bottom: 10px; }
  .field .k { font-size: 12px; color: #65676b; }
  .field .v { font-size: 14px; }
  table.compare { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.compare th, table.compare td { border: 1px solid #e1e4e8; padding: 8px; text-align: left; vertical-align: top; }
  table.compare th { background: #f4f5f7; }
  .upload-box { border: 1px dashed #ccd0d5; border-radius: 8px; padding: 16px; text-align: center; color: #65676b; font-size: 13px; }
  .progress { height: 6px; background: #e1e4e8; border-radius: 3px; margin-top: 10px; overflow: hidden; }
  .progress > div { height: 100%; background: #0f2540; transition: width .2s; }
  .tag { display: inline-block; background: #eef2f7; color: #0f2540; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-right: 4px; }
  .close-x { float: right; cursor: pointer; color: #65676b; font-size: 18px; line-height: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef } = React;

const CASES = [
  {
    id: "c1",
    title: "Поставщик vs Заказчик — недопоставка по госконтракту",
    jurisdiction: "Арбитражный суд РФ",
    type: "Договорный спор",
    date: "2023-04-12",
    facts: "Заказчик отказался принимать товар из-за просрочки поставки на 9 дней, ссылаясь на существенное нарушение условий контракта. Поставщик утверждал, что просрочка вызвана действиями самого заказчика, задержавшего согласование спецификации.",
    norms: "ст. 506, 521 ГК РФ; Закон №44-ФЗ",
    position: "Суд признал просрочку несущественной, так как заказчик сам способствовал задержке.",
    outcome: "В пользу поставщика, договор не подлежит расторжению",
    tags: ["поставка", "госконтракт", "просрочка"],
  },
  {
    id: "c2",
    title: "Спор о качестве строительных работ по подряду",
    jurisdiction: "Арбитражный суд РФ",
    type: "Договорный спор",
    date: "2022-11-03",
    facts: "Заказчик предъявил претензии к качеству выполненных строительных работ, выявленные в течение гарантийного срока. Подрядчик ссылался на нарушение заказчиком правил эксплуатации объекта.",
    norms: "ст. 723, 755 ГК РФ",
    position: "Суд назначил судебную экспертизу для определения причины дефектов.",
    outcome: "Частично в пользу заказчика, взыскана стоимость устранения дефектов",
    tags: ["подряд", "качество", "гарантия"],
  },
  {
    id: "c3",
    title: "ICC Case — нарушение поставки оборудования между сторонами из разных юрисдикций",
    jurisdiction: "ICC (Международный арбитраж)",
    type: "Международный коммерческий спор",
    date: "2021-09-20",
    facts: "Покупатель оборудования из ЕС заявил о существенной задержке поставки и дефектах партии товара от продавца из Азии. Стороны ссылались на положения CISG относительно соответствия товара условиям договора.",
    norms: "CISG ст. 35, 49",
    position: "Трибунал установил, что несоответствие товара являлось существенным нарушением.",
    outcome: "В пользу покупателя, контракт расторгнут, убытки взысканы",
    tags: ["международный", "CISG", "поставка оборудования"],
  },
  {
    id: "c4",
    title: "Корпоративный спор об оспаривании решения общего собрания",
    jurisdiction: "Арбитражный суд РФ",
    type: "Корпоративный спор",
    date: "2023-01-17",
    facts: "Миноритарный акционер оспорил решение общего собрания об увеличении уставного капитала, утверждая, что был нарушен порядок уведомления о собрании.",
    norms: "ст. 181.4 ГК РФ; ФЗ «Об АО»",
    position: "Суд установил формальное нарушение порядка уведомления, но признал его несущественным для исхода голосования.",
    outcome: "Иск отклонён",
    tags: ["корпоративный спор", "акционеры", "собрание"],
  },
  {
    id: "c5",
    title: "ICSID Case — экспроприация иностранных инвестиций",
    jurisdiction: "ICSID (Международный арбитраж)",
    type: "Инвестиционный спор",
    date: "2020-06-05",
    facts: "Иностранный инвестор заявил о косвенной экспроприации актива в результате регуляторных мер государства, существенно снизивших стоимость инвестиции.",
    norms: "Двусторонний инвестиционный договор (BIT), ст. о справедливом и равноправном режиме",
    position: "Трибунал признал меры государства непропорциональными и нарушающими обязательства по BIT.",
    outcome: "В пользу инвестора, присуждена компенсация",
    tags: ["инвестиции", "экспроприация", "BIT"],
  },
  {
    id: "c6",
    title: "Спор о недопоставке комплектующих между российскими юрлицами",
    jurisdiction: "Арбитражный суд РФ",
    type: "Договорный спор",
    date: "2024-02-28",
    facts: "Поставщик комплектующих частично не исполнил обязательства по поставке, ссылаясь на форс-мажор из-за санкционных ограничений на закупку сырья у иностранного контрагента.",
    norms: "ст. 401, 506 ГК РФ",
    position: "Суд оценивал, относятся ли санкционные ограничения к обстоятельствам непреодолимой силы для данного поставщика.",
    outcome: "Частично в пользу поставщика, ответственность снижена",
    tags: ["поставка", "форс-мажор", "санкции"],
  },
];

const JURISDICTIONS = ["Все", "Арбитражный суд РФ", "ICC (Международный арбитраж)", "ICSID (Международный арбитраж)"];
const TYPES = ["Все", "Договорный спор", "Корпоративный спор", "Международный коммерческий спор", "Инвестиционный спор"];

function tokenize(text) {
  return text.toLowerCase().match(/[а-яёa-z0-9]+/gi) || [];
}

function scoreCase(queryTokens, caseItem) {
  const haystack = tokenize(caseItem.facts + " " + caseItem.title + " " + caseItem.tags.join(" "));
  const haystackSet = new Set(haystack);
  const matched = queryTokens.filter((t) => haystackSet.has(t));
  const uniqueMatched = [...new Set(matched)];
  const score = queryTokens.length ? uniqueMatched.length / new Set(queryTokens).size : 0;
  return { score, matchedTokens: uniqueMatched };
}

function highlight(text, tokens) {
  if (!tokens.length) return text;
  const pattern = new RegExp("(" + tokens.map((t) => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|") + ")", "gi");
  const parts = text.split(pattern);
  return parts.map((part, i) =>
    tokens.some((t) => t.toLowerCase() === part.toLowerCase())
      ? <mark key={i}>{part}</mark>
      : <React.Fragment key={i}>{part}</React.Fragment>
  );
}

function UploadBox({ onUploaded }) {
  const [progress, setProgress] = useState(null);
  const fileInputRef = useRef(null);

  function simulateUpload(fileName) {
    setProgress(0);
    let p = 0;
    const interval = setInterval(() => {
      p += 20 + Math.random() * 20;
      if (p >= 100) {
        p = 100;
        clearInterval(interval);
        setTimeout(() => {
          setProgress(null);
          onUploaded(fileName);
        }, 400);
      }
      setProgress(Math.min(p, 100));
    }, 250);
  }

  return (
    <div className="upload-box">
      <div>Загрузите файлы кейсов (PDF, DOCX, TXT) — в этом прототипе обработка имитируется</div>
      <div className="actions" style={{ justifyContent: "center" }}>
        <button
          className="secondary"
          onClick={() => fileInputRef.current.click()}
          disabled={progress !== null}
        >
          Выбрать файл
        </button>
      </div>
      <input
        type="file"
        ref={fileInputRef}
        style={{ display: "none" }}
        onChange={(e) => {
          const file = e.target.files[0];
          if (file) simulateUpload(file.name);
          e.target.value = "";
        }}
      />
      {progress !== null && (
        <div>
          <div className="progress"><div style={{ width: progress + "%" }} /></div>
          <div style={{ fontSize: 12, marginTop: 6 }}>
            {progress < 100 ? "Извлечение текста и структурированных полей…" : "Готово"}
          </div>
        </div>
      )}
    </div>
  );
}

function CaseDetailModal({ caseItem, matchedTokens, onClose }) {
  if (!caseItem) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <span className="close-x" onClick={onClose}>×</span>
        <h3>{caseItem.title}</h3>
        <div>
          {caseItem.tags.map((t) => <span className="tag" key={t}>{t}</span>)}
        </div>
        <div className="field" style={{ marginTop: 12 }}>
          <div className="k">Юрисдикция / орган рассмотрения</div>
          <div className="v">{caseItem.jurisdiction}</div>
        </div>
        <div className="field">
          <div className="k">Тип спора · Дата решения</div>
          <div className="v">{caseItem.type} · {caseItem.date}</div>
        </div>
        <div className="field">
          <div className="k">Фактические обстоятельства</div>
          <div className="v">{highlight(caseItem.facts, matchedTokens || [])}</div>
        </div>
        <div className="field">
          <div className="k">Применённые нормы</div>
          <div className="v">{caseItem.norms}</div>
        </div>
        <div className="field">
          <div className="k">Правовая позиция</div>
          <div className="v">{caseItem.position}</div>
        </div>
        <div className="field">
          <div className="k">Исход дела</div>
          <div className="v">{caseItem.outcome}</div>
        </div>
      </div>
    </div>
  );
}

function CompareModal({ cases, onClose }) {
  if (!cases.length) return null;
  const rows = [
    ["Юрисдикция", (c) => c.jurisdiction],
    ["Тип спора", (c) => c.type],
    ["Дата", (c) => c.date],
    ["Факты", (c) => c.facts],
    ["Нормы", (c) => c.norms],
    ["Позиция", (c) => c.position],
    ["Исход", (c) => c.outcome],
  ];
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{ maxWidth: 900 }} onClick={(e) => e.stopPropagation()}>
        <span className="close-x" onClick={onClose}>×</span>
        <h3>Сравнение кейсов</h3>
        <table className="compare">
          <thead>
            <tr>
              <th></th>
              {cases.map((c) => <th key={c.id}>{c.title}</th>)}
            </tr>
          </thead>
          <tbody>
            {rows.map(([label, getter]) => (
              <tr key={label}>
                <th>{label}</th>
                {cases.map((c) => <td key={c.id}>{getter(c)}</td>)}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  const [query, setQuery] = useState("");
  const [jurisdiction, setJurisdiction] = useState("Все");
  const [type, setType] = useState("Все");
  const [searched, setSearched] = useState(false);
  const [selectedIds, setSelectedIds] = useState([]);
  const [openCaseId, setOpenCaseId] = useState(null);
  const [compareOpen, setCompareOpen] = useState(false);
  const [extraCases, setExtraCases] = useState([]);
  const [history, setHistory] = useState([]);

  const allCases = useMemo(() => [...CASES, ...extraCases], [extraCases]);

  const queryTokens = useMemo(() => tokenize(query), [query]);

  const results = useMemo(() => {
    if (!searched) return [];
    return allCases
      .filter((c) => jurisdiction === "Все" || c.jurisdiction === jurisdiction)
      .filter((c) => type === "Все" || c.type === type)
      .map((c) => ({ ...c, ...scoreCase(queryTokens, c) }))
      .filter((c) => queryTokens.length === 0 || c.score > 0)
      .sort((a, b) => b.score - a.score);
  }, [searched, allCases, jurisdiction, type, queryTokens]);

  function runSearch() {
    setSearched(true);
    if (query.trim()) {
      setHistory((h) => [{ query, jurisdiction, type, time: new Date().toLocaleString() }, ...h].slice(0, 10));
    }
  }

  function toggleSelect(id) {
    setSelectedIds((ids) =>
      ids.includes(id) ? ids.filter((x) => x !== id) : ids.length < 3 ? [...ids, id] : ids
    );
  }

  const openCase = allCases.find((c) => c.id === openCaseId);
  const openCaseMatched = results.find((r) => r.id === openCaseId)?.matchedTokens;
  const selectedCases = allCases.filter((c) => selectedIds.includes(c.id));

  function handleUploaded(fileName) {
    const newCase = {
      id: "u" + Date.now(),
      title: `Новый кейс из файла «${fileName}»`,
      jurisdiction: "Арбитражный суд РФ",
      type: "Договорный спор",
      date: new Date().toISOString().slice(0, 10),
      facts: "Метаданные извлечены автоматически из загруженного файла (демонстрационные данные). Требуется ручная проверка перед использованием.",
      norms: "—",
      position: "—",
      outcome: "—",
      tags: ["новый", "требует проверки"],
    };
    setExtraCases((cs) => [newCase, ...cs]);
  }

  return (
    <React.Fragment>
      <header>
        <h1>LexCaseAdvisor</h1>
        <p>Поиск похожих судебных и арбитражных кейсов по фактическим обстоятельствам</p>
      </header>
      <div className="container">
        <div className="panel">
          <h2>Поиск по фабуле спора</h2>
          <textarea
            rows={4}
            placeholder="Опишите фактические обстоятельства вашей ситуации…"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
          />
          <div className="filters">
            <div>
              <label>Юрисдикция</label>
              <select value={jurisdiction} onChange={(e) => setJurisdiction(e.target.value)}>
                {JURISDICTIONS.map((j) => <option key={j} value={j}>{j}</option>)}
              </select>
            </div>
            <div>
              <label>Тип спора</label>
              <select value={type} onChange={(e) => setType(e.target.value)}>
                {TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          </div>
          <div className="actions">
            <button onClick={runSearch}>Найти похожие кейсы</button>
            <button className="secondary" onClick={() => { setQuery(""); setSearched(false); }}>
              Очистить
            </button>
          </div>
        </div>

        <div className="panel">
          <h2>
            Результаты {searched && `(${results.length})`}
            {selectedIds.length >= 2 && (
              <button style={{ float: "right" }} onClick={() => setCompareOpen(true)}>
                Сравнить выбранные ({selectedIds.length})
              </button>
            )}
          </h2>
          {!searched && <div className="empty">Введите описание ситуации и нажмите «Найти похожие кейсы».</div>}
          {searched && results.length === 0 && <div className="empty">Кейсы по заданным критериям не найдены.</div>}
          <div className="results">
            {results.map((c) => (
              <div
                key={c.id}
                className={"case-card" + (selectedIds.includes(c.id) ? " selected" : "")}
                onClick={() => setOpenCaseId(c.id)}
              >
                <div className="top">
                  <div className="title">{c.title}</div>
                  <div className="score">{Math.round(c.score * 100)}% релевантность</div>
                </div>
                <div className="meta">{c.jurisdiction} · {c.type} · {c.date}</div>
                <div>{highlight(c.facts, c.matchedTokens)}</div>
                {c.matchedTokens.length > 0 && (
                  <div className="why">Совпадение по фактам: {c.matchedTokens.join(", ")}</div>
                )}
                <div style={{ marginTop: 8 }} onClick={(e) => e.stopPropagation()}>
                  <label style={{ fontSize: 12 }}>
                    <input
                      type="checkbox"
                      checked={selectedIds.includes(c.id)}
                      onChange={() => toggleSelect(c.id)}
                    />{" "}
                    выбрать для сравнения
                  </label>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="panel">
          <h2>Загрузка нового кейса</h2>
          <UploadBox onUploaded={handleUploaded} />
        </div>

        {history.length > 0 && (
          <div className="panel">
            <h2>История запросов</h2>
            {history.map((h, i) => (
              <div key={i} className="empty" style={{ padding: "4px 0" }}>
                {h.time} — «{h.query}» ({h.jurisdiction}, {h.type})
              </div>
            ))}
          </div>
        )}
      </div>

      <CaseDetailModal
        caseItem={openCase}
        matchedTokens={openCaseMatched}
        onClose={() => setOpenCaseId(null)}
      />
      <CompareModal
        cases={compareOpen ? selectedCases : []}
        onClose={() => setCompareOpen(false)}
      />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
